<!DOCTYPE html>
<html lang="pt-BR">

  <title>Tutorial - Emissão de NFS-e</title>
  <style>
    :root {
      --primary: #1565C0;
      --primary-light: #1E88E5;
      --primary-dark: #0D47A1;
      --accent: #FF6F00;
      --success: #2E7D32;
      --warning: #F57F17;
      --danger: #C62828;
      --bg: #F0F4F8;
      --card: #FFFFFF;
      --text: #1A237E;
      --text-body: #263238;
      --text-light: #546E7A;
      --border: #CFD8DC;
      --shadow: 0 4px 20px rgba(21,101,192,0.10);
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text-body); line-height: 1.7;
    }
    .hero {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
      color: white; padding: 64px 24px; text-align: center; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 280px; height: 280px; background: rgba(255,255,255,0.05); border-radius: 50%;
    }
    .hero::after {
      content: ''; position: absolute; bottom: -80px; left: -40px;
      width: 320px; height: 320px; background: rgba(255,255,255,0.04); border-radius: 50%;
    }
    .hero-badge {
      display: inline-block; background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3); padding: 6px 20px; border-radius: 24px;
      font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px;
    }
    .hero h1 { font-size: 42px; font-weight: 800; margin-bottom: 12px; letter-spacing: -1px; }
    .hero p { font-size: 18px; opacity: 0.85; max-width: 560px; margin: 0 auto 32px; }
    .hero-pills { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .hero-pill {
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.25);
      padding: 8px 20px; border-radius: 32px; font-size: 14px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .progress-nav {
      background: white; padding: 0; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow-x: auto;
    }
    .progress-nav-inner { display: flex; max-width: 1100px; margin: 0 auto; min-width: max-content; }
    .nav-step {
      padding: 16px 24px; font-size: 13px; font-weight: 600; color: var(--text-light);
      cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s;
      white-space: nowrap; display: flex; align-items: center; gap: 8px;
    }
    .nav-step:hover { color: var(--primary); border-bottom-color: var(--primary-light); }
    .nav-step.active { color: var(--primary); border-bottom-color: var(--primary); }
    .nav-step .step-num {
      width: 22px; height: 22px; background: var(--border); border-radius: 50%;
      font-size: 11px; display: flex; align-items: center; justify-content: center;
      font-weight: 700; transition: all 0.2s;
    }
    .nav-step.active .step-num, .nav-step:hover .step-num { background: var(--primary); color: white; }
    .main { max-width: 860px; margin: 0 auto; padding: 48px 20px; }
    .section { margin-bottom: 64px; scroll-margin-top: 72px; }
    .section-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
    .section-icon {
      width: 64px; height: 64px; border-radius: 18px;
      display: flex; align-items: center; justify-content: center; font-size: 30px; flex-shrink: 0;
    }
    .section-icon.blue { background: #E3F2FD; }
    .section-icon.green { background: #E8F5E9; }
    .section-icon.orange { background: #FFF3E0; }
    .section-icon.purple { background: #F3E5F5; }
    .section-icon.teal { background: #E0F7FA; }
    .section-title { font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
    .section-subtitle { font-size: 15px; color: var(--text-light); margin-top: 4px; }
    .steps { display: flex; flex-direction: column; gap: 20px; }
    .step-card {
      background: var(--card); border-radius: var(--radius); padding: 28px 28px 28px 24px;
      box-shadow: var(--shadow); display: flex; gap: 20px; align-items: flex-start;
      border-left: 4px solid var(--primary-light); transition: transform 0.2s, box-shadow 0.2s;
    }
